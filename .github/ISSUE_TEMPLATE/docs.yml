name: Docs
description: Documentation work such as guides, onboarding material, or technical writing
body:
  - type: input
    id: title
    attributes:
      label: Title
      placeholder: Short, descriptive name for this documentation work
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this documentation needed? What gap does it fill?
    validations:
      required: false

  - type: textarea
    id: what-to-document
    attributes:
      label: What to Document
      description: Describe the content, topics, or sections to be written.
    validations:
      required: true

  - type: input
    id: audience
    attributes:
      label: Audience
      placeholder: "e.g. new developers, end users, AI agents"
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: What makes this documentation complete?
    validations:
      required: false

  - type: textarea
    id: ai-context
    attributes:
      label: AI Context
      description: Key facts an AI agent needs to write or review this documentation.
    validations:
      required: false
