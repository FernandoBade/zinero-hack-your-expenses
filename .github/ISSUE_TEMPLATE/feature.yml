name: Feature
description: Functional delivery or product capability that belongs to an Epic
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who is affected and why does it matter?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solution
      description: What is the proposed solution or approach?
      placeholder: "As a [role], I want [goal] so that [reason]"
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Conditions that must be true for this feature to be considered done.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included in this feature delivery?
    validations:
      required: false

  - type: textarea
    id: technical-notes
    attributes:
      label: Technical Notes
      description: Implementation hints, constraints, or architectural considerations.
    validations:
      required: false

  - type: textarea
    id: ai-context
    attributes:
      label: AI Context
      description: Key facts an AI agent needs to implement or review this feature.
    validations:
      required: false
